version: '3.8'

services:
  # HttpRun 应用
  httprun:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: httprun-app
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=httprun
      - DB_PASSWORD=httprun123
      - JWT_SECRET=your-production-jwt-secret-key-change-this-at-least-32-chars
      - INIT_ADMIN_TOKEN=false
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - httprun-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - httprun-logs:/var/log/httprun

  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: httprun-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=httprun
      - POSTGRES_USER=httprun
      - POSTGRES_PASSWORD=httprun123
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgresql/init:/docker-entrypoint-initdb.d
    networks:
      - httprun-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U httprun -d httprun"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  httprun-network:
    driver: bridge

volumes:
  postgres-data:
  httprun-logs:
